; SENDER
[env:nrf52840dk_nrf52840]
platform = nordicnrf52
board = nrf52840_dk
framework = zephyr

; Upload configuration for J-Link
; For whatever reason, I had to use the exact path to the JLink executable and specify the device, interface, speed, and command file directly in the upload_command. This is a workaround for issues I encountered with the default upload method.
upload_protocol = custom
upload_command = C:\PROGRA~1\SEGGER\JLink\JLink.exe -device NRF52840_XXAA -if SWD -speed 4000 -SelectEmuBySN 683565603 -CommandFile C:\Users\parham\OneDrive\Documents\PlatformIO\Projects\Lab3\Sender\upload.jlink

monitor_speed = 115200
